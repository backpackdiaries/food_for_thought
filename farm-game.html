<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>farm game</title>
<style>
body{
    margin:0;
    background:#111;
    color:#00e326;
    font-family:monospace;
    /* overflow:hidden; */
}
pre{
    margin:0;
    font-size:16px;
    line-height:16px;
}
#ui{
    /* position:fixed; */
    top:5px;
    left:5px;
    color:#ff70f1;
}
</style>
</head>
<body>
<a href="/food_for_thought/"><- Back to Index</a>
    note *this game can only be played on a computer*
<div id="ui"></div>
<pre id="game"></pre>
<audio id="bgm" loop>
  <source src="farm-game.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
const bgm = document.getElementById("bgm");
let musicStarted = false;

window.addEventListener("keydown", () => {
    if (!musicStarted) {
        bgm.play();
        musicStarted = true;
    }
}, { once: true });
</script>

    
<script>
const tiles = {};
const WIDTH=30;
const HEIGHT=15;

const game=document.getElementById("game");
const ui=document.getElementById("ui");

let player={
    x:0,
    y:0,
    seeds:0
};

const plants={};

function key(x,y){
    return x+","+y;
}

// deterministic random terrain
function rand(x,y){
    let n=x*374761393+y*668265263;
    n=(n^(n>>13))*1274126177;
    return ((n^(n>>16))>>>0)/4294967295;
}

function terrain(x, y) {

    const id = key(x, y);

    if (tiles[id] !== undefined)
        return tiles[id];

    let r = rand(x, y);

    if (r < 0.03) return "｡";
    // if (r < 0.04) return "𖧧";
    if (r < 0.04) return "↟";
    return " ";
}

function updatePlants(){

    for(let id in plants){

        let p=plants[id];
        p.age++;

        if(p.age<20)p.char="⸝";
        else if(p.age<50)p.char=" ༘";
        else if(p.age<90)p.char="𖥧";
        else if(p.age<140)p.char="⚘";
        else p.char="𖤣";
    }

}

function draw(){

    let out="";

    let left=player.x-Math.floor(WIDTH/2);
    let top=player.y-Math.floor(HEIGHT/2);

    for(let y=0;y<HEIGHT;y++){

        for(let x=0;x<WIDTH;x++){

            let wx=left+x;
            let wy=top+y;

            let c=terrain(wx,wy);

            let id=key(wx,wy);

            if(plants[id]) c=plants[id].char;

            if(wx==player.x && wy==player.y)
                c="𖠋";

            out+=c;
        }

        out+="\n";
    }

    game.textContent=out;

    ui.innerHTML=
    "Seeds: "+player.seeds+
    "<br>Move: WASD / Arrows"+
    "<br>Plant: SPACE"+
    "<br>𖠋 You   ｡ Seed   𖤣 Fruit";

}

function collect(){

    let id = key(player.x, player.y);

    if (terrain(player.x, player.y) == "｡") {

        player.seeds++;

        // permanently replace the seed with dirt
        tiles[id] = " ";
    }

    if (plants[id] && plants[id].char == "𖤣") {

        delete plants[id];

        player.seeds += 3;
    }
}

function move(dx,dy){

    let nx=player.x+dx;
    let ny=player.y+dy;

    // if(terrain(nx,ny)=="~")
    //     return;

    player.x=nx;
    player.y=ny;

    collect();

}

window.addEventListener("keydown",e=>{

    switch(e.key){

        case "ArrowUp":
        case "w":
        case "W":
            move(0,-1);
            break;

        case "ArrowDown":
        case "s":
        case "S":
            move(0,1);
            break;

        case "ArrowLeft":
        case "a":
        case "A":
            move(-1,0);
            break;

        case "ArrowRight":
        case "d":
        case "D":
            move(1,0);
            break;

        case " ":

            if(player.seeds>0){

                let id=key(player.x,player.y);

                if(!plants[id] && terrain(player.x,player.y)==" "){

                    plants[id]={
                        age:0,
                        char:"⸝"
                    };

                    player.seeds--;
                }
            }

            break;
    }

    draw();

});

setInterval(()=>{
    updatePlants();
    draw();
},250);

draw();

</script>

</body>
</html>
